# GoReleaser config for the mermaid CLI.
# https://goreleaser.com
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mermaid
    main: ./cmd/mermaid
    binary: mermaid
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

# Legacy dockers/docker_manifests: deprecated in favour of dockers_v2, but
# dockers_v2 ships an empty build context (the binary is never staged), so the
# Dockerfile COPY fails. These reliably copy the per-arch binary into context.
dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/zkrebbekx/go-mermaid:{{ .Version }}-amd64"
      - "ghcr.io/zkrebbekx/go-mermaid:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/zkrebbekx/go-mermaid"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/zkrebbekx/go-mermaid:{{ .Version }}-arm64"
      - "ghcr.io/zkrebbekx/go-mermaid:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/zkrebbekx/go-mermaid"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/zkrebbekx/go-mermaid:{{ .Version }}"
    image_templates:
      - "ghcr.io/zkrebbekx/go-mermaid:{{ .Version }}-amd64"
      - "ghcr.io/zkrebbekx/go-mermaid:{{ .Version }}-arm64"
  - name_template: "ghcr.io/zkrebbekx/go-mermaid:latest"
    image_templates:
      - "ghcr.io/zkrebbekx/go-mermaid:latest-amd64"
      - "ghcr.io/zkrebbekx/go-mermaid:latest-arm64"

homebrew_casks:
  - name: mermaid
    description: Pure-Go Mermaid diagram renderer (SVG/PNG), no browser or Node
    homepage: https://github.com/zkrebbekx/go-mermaid
    repository:
      owner: zkrebbekx
      name: homebrew-tap
      token: '{{ index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}'
    # Auto-skips when the tap token isn't configured, so the first release
    # succeeds before the tap repo/secret exist; set the secret to enable.
    # `index .Env` returns "" for a missing key (unlike .Env.X, which errors);
    # there is no envOrDefault template function in GoReleaser.
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: goreleaser-bot
      email: goreleaser@users.noreply.github.com

release:
  # release-please already created the GitHub Release and tag; attach
  # the built archives and checksums to it rather than creating a new one.
  mode: append

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
